<!DOCTYPE html>
<html>
<head>
<title>LS Smart Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

.header{
background:black;
color:white;
padding:20px;
text-align:center;
font-size:26px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
width:220px;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:green;
font-size:20px;
}

button{
background:#25D366;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="header">
LS Smart Store
</div>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Smart Watch</h3>
<p class="price">₹699</p>
<button onclick="order('Smart Watch')">Order</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Wireless Earbuds</h3>
<p class="price">₹599</p>
<button onclick="order('Wireless Earbuds')">Order</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Bluetooth Speaker</h3>
<p class="price">₹799</p>
<button onclick="order('Bluetooth Speaker')">Order</button>
</div>

</div>

<script>

function order(product){

let phone="916261560776";

let message="Hello I want to order " + product;

window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(message));

}

</script>

</body>
  </html>
